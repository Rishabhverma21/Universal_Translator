<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Translator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main">

    <h1>UNIVERSAL TRANSLATOR</h1>

    <!-- NEW OPTIONAL LINE -->
    <p style="text-align:center; opacity:0.7;">
        Fast & Secure • Accurate • Multi-language Support
    </p>

    <div class="translator-box">
        <form method="POST">

            <!-- INPUT LANGUAGE -->
            <select name="src_lang">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh-cn">Chinese</option>
                <option value="ar">Arabic</option>
                <option value="tr">Turkish</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="mr">Marathi</option>
                <option value="bn">Bengali</option>
                <option value="gu">Gujarati</option>
                <option value="pa">Punjabi</option>
                <option value="ur">Urdu</option>
            </select>

            <!-- OUTPUT LANGUAGE -->
            <select name="dest_lang">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh-cn">Chinese</option>
                <option value="ar">Arabic</option>
                <option value="tr">Turkish</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="mr">Marathi</option>
                <option value="bn">Bengali</option>
                <option value="gu">Gujarati</option>
                <option value="pa">Punjabi</option>
                <option value="ur">Urdu</option>
            </select>

            <!-- INPUT BOX -->
            <div class="box">
                <textarea id="inputText" name="text" placeholder="Enter text here...">{{ original }}</textarea>
                <button type="button" onclick="speakInput()">🔊</button>
            </div>

            <!-- OUTPUT BOX -->
            <div class="box">
                <textarea readonly id="outputText" placeholder="Translation will appear here...">{{ translated }}</textarea>
                <button type="button" onclick="speakOutput()">🔊</button>
            </div>

            <!-- TRANSLATE BUTTON -->
            <div class="center-btn">
                <button type="submit">TRANSLATE</button>
            </div>

        </form>
    </div>

    <footer>
        Made by Rishabh, Atharv & Sakshi
    </footer>

</div>

<!-- SPEAK SCRIPT -->
<script>
function speakInput() {
    let text = document.getElementById("inputText").value;
    if (!text.trim()) {
        alert("Enter text first!");
        return;
    }
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "{{ src }}";
    window.speechSynthesis.speak(speech);
}

function speakOutput() {
    let text = document.getElementById("outputText").value;
    if (!text.trim()) {
        alert("Translate something first!");
        return;
    }
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "{{ dest }}";
    window.speechSynthesis.speak(speech);
}
</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
