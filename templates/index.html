<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Translator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: white;
            text-align: center;
        }

        .main {
            width: 85%;
            margin: 40px auto;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .translator-box {
            margin-top: 30px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        select {
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            width: 220px;
        }

        textarea {
            width: 42%;
            height: 180px;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 17px;
            resize: none;
        }

        button {
            padding: 14px 30px;
            margin: 12px;
            border: none;
            border-radius: 12px;
            background: #7c3aed;
            color: white;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background: #9333ea;
        }

        .features {
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
        }

        footer {
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="main">
        <h1>UNIVERSAL TRANSLATOR</h1>
        <p>Translate any language instantly with speech output</p>

        <div class="translator-box">
            <form method="POST">

                <select name="src_lang">
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-CN">Chinese</option>
                    <option value="ar">Arabic</option>
                    <option value="tr">Turkish</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="mr">Marathi</option>
                    <option value="bn">Bengali</option>
                    <option value="gu">Gujarati</option>
                    <option value="pa">Punjabi</option>
                    <option value="ur">Urdu</option>
                </select>

                <select name="dest_lang">
                    <option value="hi">Hindi</option>
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-CN">Chinese</option>
                    <option value="ar">Arabic</option>
                    <option value="tr">Turkish</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="mr">Marathi</option>
                    <option value="bn">Bengali</option>
                    <option value="gu">Gujarati</option>
                    <option value="pa">Punjabi</option>
                    <option value="ur">Urdu</option>
                </select>

                <br>

                <textarea name="text" placeholder="Enter text here...">{{ original }}</textarea>

                <textarea readonly placeholder="Translation will appear here...">{{ translated }}</textarea>

                <br>

                <button type="submit">TRANSLATE</button>
            </form>

            <button onclick="speakText()">SPEAK</button>
        </div>

        <div class="features">
            <div class="card">
                <h3>Fast & Secure</h3>
                <p>Lightning fast translation with safe processing</p>
            </div>

            <div class="card">
                <h3>Translate Language</h3>
                <p>Supports multiple global and Indian languages</p>
            </div>

            <div class="card">
                <h3>Accurate</h3>
                <p>High accuracy translations with voice support</p>
            </div>
        </div>

        <footer>
            Made by Rishabh, Atharv & Sakshi
        </footer>
    </div>

    <script>
        function speakText() {
            let text = `{{ translated }}`;
            let lang = `{{ dest }}`;

            if (!text || text.trim() === "") {
                alert("Please translate some text first.");
                return;
            }

            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = lang;

            window.speechSynthesis.speak(speech);
        }
    </script>

</body>
</html>
